<!DOCTYPE html>
<html>
<head>
    <title>Socket.IO Test</title>
    <script src="http://019f2620-f637-778e-ada0-c547863f9e52.agent.localhost/socket.io/socket.io.js"></script>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #fff; padding: 20px; }
        #output { background: #000; padding: 10px; height: 300px; overflow-y: scroll; border: 1px solid #333; margin-top: 10px; }
        input { padding: 10px; width: 300px; font-family: monospace; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Terminal Test (Agent)</h2>
    <div style="margin-bottom: 10px;">
        <span id="status" style="color: yellow;">Connecting...</span>
    </div>
    
    <input type="text" id="cmd" placeholder="Enter command (e.g. ls, pwd, echo hi)" autocomplete="off">
    <button onclick="sendCommand()">Send</button>

    <div id="output"></div>

    <script>
        const socket = io("http://019f2620-f637-778e-ada0-c547863f9e52.agent.localhost", {
            transports: ['websocket', 'polling']
        });

        const outputDiv = document.getElementById("output");
        const statusSpan = document.getElementById("status");
        const cmdInput = document.getElementById("cmd");

        socket.on("connect", () => {
            statusSpan.innerText = "Connected! ✅";
            statusSpan.style.color = "lime";
            outputDiv.innerHTML += `<div>[System] Connected to agent...</div>`;
        });

        socket.on("disconnect", () => {
            statusSpan.innerText = "Disconnected ❌";
            statusSpan.style.color = "red";
        });

        // Listen for terminal output
        socket.on("terminal-output", (data) => {
            // Replace newlines with <br> and add to output
            const formatted = data.replace(/\n/g, "<br>").replace(/ /g, "&nbsp;");
            outputDiv.innerHTML += `<div>${formatted}</div>`;
            outputDiv.scrollTop = outputDiv.scrollHeight;
        });

        function sendCommand() {
            const cmd = cmdInput.value;
            if (cmd) {
                // Send terminal-input with newline
                socket.emit("terminal-input", cmd + "\n");
                cmdInput.value = "";
            }
        }

        // Allow pressing Enter to send
        cmdInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendCommand();
            }
        });
    </script>
</body>
</html>
