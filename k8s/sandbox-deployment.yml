apiVersion: apps/v1
kind: Deployment
metadata:
  name:  main-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-sandbox
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: main-sandbox
    spec:
      containers:
      - image:  sandbox-latest
        name:  main-sandbox-container
        resources:
          requests:
            cpu: "250m"
            memory: "200Mi"
          limits:
            cpu: "500m"
            memory: "400Mi"
        livenessProbe:
          httpGet:
            path: /api/sandbox/health
            port: 5000
          initialDelaySeconds: 90
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/sandbox/health
            port: 5000
          initialDelaySeconds: 30
          timeoutSeconds: 10     
        ports:
        - containerPort:  5000
          name:  main-sandbox-container
