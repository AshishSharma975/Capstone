apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codespace

spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/sandbox
        pathType: Prefix
        backend:
          service:
            name: main-sandbox-service
            port:
              number: 80


    # router
  - host: "*.preview.localhost"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
            service:
              name: router-service
              port:
                number: 80